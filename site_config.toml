# コンテスト別の表示設定。
#
# 指定できる4パターン:
#   表形式で最新のほど上:     layout = "table", order = "latest_first"
#   表形式で最新のほど下:     layout = "table", order = "oldest_first"
#   一覧形式で最新のほど上:   layout = "list",  order = "latest_first"
#   一覧形式で最新のほど下:   layout = "list",  order = "oldest_first"
#
# table の場合だけ columns を使います。

[[contest_views]]
id = "ABC"
title = "ABC"
path = "abc.html"
layout = "table"
order = "latest_first"
columns = ["A", "B", "C", "D", "E", "F", "G"]

